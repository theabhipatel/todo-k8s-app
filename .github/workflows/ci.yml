name: CI - Build and Push Docker Images

on:
  push:
    branches:
      - master
    paths-ignore:
      - "k8s/**"

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            itheabhipatel/todo-backend-live:latest
            itheabhipatel/todo-backend-live:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            itheabhipatel/todo-frontend-live:latest
            itheabhipatel/todo-frontend-live:${{ github.sha }}
      
      - name: Update Kubernetes image tags
        run: |
          sed -i "s|image: itheabhipatel/todo-backend-live:.*|image: itheabhipatel/todo-backend-live:${{ github.sha }}|" k8s/backend/backend-deployment.yaml
          sed -i "s|image: itheabhipatel/todo-frontend-live:.*|image: itheabhipatel/todo-frontend-live:${{ github.sha }}|" k8s/frontend/frontend-deployment.yaml

      - name: Commit and push Kubernetes manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/backend/backend-deployment.yaml
          git add k8s/frontend/frontend-deployment.yaml
          git commit -m "chore: update Docker images to ${{ github.sha }}" || exit 0
          git push
      