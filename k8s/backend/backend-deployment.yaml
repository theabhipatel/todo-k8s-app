apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: todo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: itheabhipatel/todo-backend-live:v1
          ports:
            - containerPort: 3100
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: mongo-secret